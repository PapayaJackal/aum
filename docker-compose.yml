services:
  # Alternative: Meilisearch backend (set AUM_SEARCH_BACKEND=meilisearch)
  # meilisearch:
  #   restart: "always"
  #   image: docker.io/getmeili/meilisearch:v1.40.0
  #   environment:
  #     - MEILI_NO_ANALYTICS=true
  #   ports:
  #     - "7700:7700"
  #   volumes:
  #     - meili-data:/meili_data

  tika:
    restart: "always"
    image: docker.io/apache/tika:3.3.0.0-full
    ports:
      - "9998:9998"

  opensearch:
    restart: "always"
    image: docker.io/opensearchproject/opensearch:3.6.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Tr0ub4dor&3xKq9fLp
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - search.insights.top_queries.exporter.type=none
      - search.insights.top_queries.latency.enabled=false
      - search.insights.top_queries.cpu.enabled=false
      - search.insights.top_queries.memory.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  # Run Ollama on the host for GPU acceleration (`ollama serve`).
  # ollama:
  #   image: docker.io/ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   environment:
  #     - OLLAMA_NUM_PARALLEL=8

volumes:
  opensearch-data:
  # meili-data:
