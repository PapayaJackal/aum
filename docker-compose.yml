services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  tika:
    image: docker.io/apache/tika:3.3.0.0
    ports:
      - "9998:9998"

volumes:
  es-data:
