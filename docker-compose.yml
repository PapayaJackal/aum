services:
  meilisearch:
    restart: "always"
    image: docker.io/getmeili/meilisearch:v1.40.0
    environment:
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  tika:
    restart: "always"
    image: docker.io/apache/tika:3.3.0.0-full
    ports:
      - "9998:9998"

  # Alternative: Elasticsearch backend (set AUM_SEARCH_BACKEND=elasticsearch)
