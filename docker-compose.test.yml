name: aum-test

services:
  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.40.0
    environment:
      - MEILI_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 15

  tika:
    image: docker.io/apache/tika:3.3.0.0-full
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9998/tika || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  ollama:
    image: docker.io/ollama/ollama:latest
    environment:
      - OLLAMA_NUM_PARALLEL=4
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 15

  test-runner:
    build: .
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -ex
        uv sync --frozen --no-dev
        uv pip install pytest-order pytest-asyncio
        env -i HOME="$HOME" PATH="$PATH" PYTHONUNBUFFERED=1 uv run python -m pytest tests/ --ignore=tests/integration -x -q
        uv pip install pytest-playwright
        uv run playwright install chromium --with-deps
        uv run python -c "import httpx; httpx.post('http://ollama:11434/api/pull', json={'name':'snowflake-arctic-embed:xs'}, timeout=300).raise_for_status()"
        uv run python -m pytest tests/integration/ -v --tb=short -x -o asyncio_mode=strict
    working_dir: /app
    depends_on:
      meilisearch:
        condition: service_healthy
      tika:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - AUM_SEARCH_BACKEND=meilisearch
      - AUM_MEILI_URL=http://meilisearch:7700
      - AUM_MEILI_INDEX=aum
      - AUM_TIKA_SERVER_URL=http://tika:9998
      - AUM_OLLAMA_URL=http://ollama:11434
      - AUM_DATA_DIR=/data
      - AUM_JWT_SECRET=integration-test-secret-that-is-at-least-32-bytes
      - AUM_LOG_FORMAT=console
      - AUM_LOG_LEVEL=INFO
      - AUM_EMBEDDINGS_ENABLED=false
      - AUM_EMBEDDINGS_MODEL=snowflake-arctic-embed:xs
      - AUM_EMBEDDINGS_DIMENSION=384
      - AUM_EMBEDDINGS_QUERY_PREFIX=query:${" "}
      - AUM_OCR_ENABLED=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ./testdata:/testdata:ro,z

volumes:
  ollama-data:
