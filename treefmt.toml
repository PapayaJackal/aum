[global]
excludes = [
  "testdata/**",
  "data/**",
  "*.lock",
  "frontend/node_modules/**",
  ".venv/**",
  ".git/**",
]

[formatter.rustfmt]
command = "rustfmt"
options = ["--edition", "2024"]
includes = ["*.rs"]

[formatter.prettier]
command = "./frontend/node_modules/.bin/prettier"
options = ["--write"]
includes = ["*.ts", "*.svelte", "*.js"]
